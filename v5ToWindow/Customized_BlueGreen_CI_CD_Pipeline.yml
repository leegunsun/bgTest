# Gradle 기반 Blue-Green Deployment CI/CD Pipeline
# 기존 개발 환경을 유지하면서 Blue-Green 배포 적용

stages:
  - build-dev
  - test-dev
  - deploy-green-dev
  - health-check-dev
  - switch-traffic-dev
  - verify-dev
  - cleanup-dev

variables:
  GIT_DEPTH: 0
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

# Cache Gradle dependencies
cache:
  key: "$CI_COMMIT_REF_NAME-gradle"
  paths:
    - .gradle/wrapper
    - .gradle/caches

# Build Stage - 기존 Gradle 빌드 환경 유지
build-dev:
  stage: build-dev
  image: eclipse-temurin:19
  before_script:
    - chmod +x ./gradlew
  script:
    - echo "🔨 Building Spring Boot application with Gradle..."
    - cp $DEV_ENV_FILE ./.env
    - cp $DEV_APPLICATION ./src/main/resources/application.yml
    - ./gradlew clean build -x test
    - echo "Build completed successfully"
    
    # JAR 파일명 표준화 (블루-그린 배포용)
    - cd build/libs/
    - mv woorishop_be-1.0-SNAPSHOT.jar woori_be.jar
    
  artifacts:
    expire_in: 1 hour
    paths:
      - ./build/libs/woori_be.jar
      - ./.env
      - ./deploy-bluegreen.sh
      - ./src/main/resources/static/swagger-status/api-meta.json
  only:
    - dev
    - main

# Test Stage - Gradle 테스트 실행
test-dev:
  stage: test-dev
  image: eclipse-temurin:19
  before_script:
    - chmod +x ./gradlew
  script:
    - echo "🧪 Running unit tests with Gradle..."
    - cp $DEV_ENV_FILE ./.env
    - cp $DEV_APPLICATION ./src/main/resources/application.yml
    - ./gradlew test
    - echo "Tests completed successfully"
  artifacts:
    reports:
      junit:
        - build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/
  dependencies:
    - build-dev
  only:
    - dev
    - main

# Deploy to Green Environment - 기존 SSH 구조 활용
deploy-green-dev:
  stage: deploy-green-dev
  image: alpine:latest
  before_script:
    - "which ssh-agent || ( apk update && apk add openssh-client )"
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - chmod 600 $AWS_PEM_DEV
    - ssh-add $AWS_PEM_DEV
    - echo -e "Host *\\n\\tStrictHostKeyChecking no\\n\\n" > ~/.ssh/config
  script:
    - echo "🚀 Deploying to GREEN environment..."
    
    # 1. 블루-그린 디렉토리 구조 생성 (한 번만 실행)
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        sudo mkdir -p /home/ubuntu/dev/woori_be/{blue,green,deployment};
        sudo chown -R ubuntu:ubuntu /home/ubuntu/dev/woori_be/;
      "
    
    # 2. 배포 스크립트와 설정 파일 업로드
    - scp ./deploy-bluegreen.sh ubuntu@$DEPLOY_SERVER_DEV:/home/ubuntu/dev/woori_be/deployment/
    - scp ./.env ubuntu@$DEPLOY_SERVER_DEV:/home/ubuntu/dev/woori_be/green/
    
    # 3. JAR 파일 업로드
    - scp ./build/libs/woori_be.jar ubuntu@$DEPLOY_SERVER_DEV:/home/ubuntu/dev/woori_be/green/
    
    # 4. Green 환경 배포 실행
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        cd /home/ubuntu/dev/woori_be/deployment;
        chmod +x deploy-bluegreen.sh;
        ./deploy-bluegreen.sh deploy green;
      "
    
    - echo "GREEN environment deployment completed"
  environment:
    name: green-dev
    url: http://$DEPLOY_SERVER_DEV:8083
  dependencies:
    - build-dev
    - test-dev
  only:
    - dev
    - main

# Health Check Green Environment - 기존 인프라 활용
health-check-dev:
  stage: health-check-dev
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - chmod 600 $AWS_PEM_DEV
    - ssh-add $AWS_PEM_DEV
    - echo -e "Host *\\n\\tStrictHostKeyChecking no\\n\\n" > ~/.ssh/config
  script:
    - echo "🏥 Running health checks on GREEN environment..."
    
    # Wait for services to be ready
    - sleep 30
    
    # Health check script - 기존 서버 구조에 맞춰 조정
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        echo 'Checking GREEN services health...';
        
        # Check Green service 1 (port 8083)
        for i in {1..10}; do
          if curl -sf http://localhost:8083/actuator/health > /dev/null 2>&1; then
            echo '✓ Green service 1 (8083) is healthy';
            break;
          fi;
          if [ \$i -eq 10 ]; then
            echo '✗ Green service 1 health check failed';
            exit 1;
          fi;
          echo 'Attempt '\$i'/10 - waiting for service...';
          sleep 5;
        done;
        
        echo 'All GREEN services are healthy';
      "
    
    - echo "Health check completed successfully"
  dependencies:
    - deploy-green-dev
  retry: 2

# Switch Traffic to Green - Manual Approval
switch-traffic-dev:
  stage: switch-traffic-dev
  image: alpine:latest
  when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - chmod 600 $AWS_PEM_DEV
    - ssh-add $AWS_PEM_DEV
    - echo -e "Host *\\n\\tStrictHostKeyChecking no\\n\\n" > ~/.ssh/config
  script:
    - echo "🔄 Switching traffic to GREEN environment..."
    
    # Execute traffic switch using deployment script
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        cd /home/ubuntu/dev/woori_be/deployment;
        ./deploy-bluegreen.sh switch green;
      "
    
    - echo "Traffic switched to GREEN environment"
    - echo "🎉 Production deployment completed!"
  environment:
    name: production-dev
    url: http://$DEPLOY_SERVER_DEV
  dependencies:
    - health-check-dev

# Verify Production - 기존 검증 방식 유지
verify-dev:
  stage: verify-dev
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "✅ Verifying production deployment..."
    
    # Production health check - 기존 서버 사용
    - |
      for i in {1..5}; do
        if curl -sf http://$DEPLOY_SERVER_DEV/actuator/health > /dev/null; then
          echo "✓ Production health check passed"
          break
        fi
        if [ $i -eq 5 ]; then
          echo "✗ Production health check failed"
          exit 1
        fi
        sleep 5
      done
    
    # Basic smoke tests
    - curl -sf http://$DEPLOY_SERVER_DEV > /dev/null
    - echo "✓ Smoke tests passed"
    
    - echo "Production verification completed"
  dependencies:
    - switch-traffic-dev

# Cleanup Blue Environment - Manual
cleanup-dev:
  stage: cleanup-dev
  image: alpine:latest
  when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - chmod 600 $AWS_PEM_DEV
    - ssh-add $AWS_PEM_DEV
    - echo -e "Host *\\n\\tStrictHostKeyChecking no\\n\\n" > ~/.ssh/config
  script:
    - echo "🧹 Cleaning up BLUE environment..."
    
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        cd /home/ubuntu/dev/woori_be/deployment;
        ./deploy-bluegreen.sh cleanup blue;
      "
    
    - echo "BLUE environment cleanup completed"
  dependencies:
    - verify-dev

# Emergency Rollback Job - Manual
rollback-dev:
  stage: cleanup-dev
  image: alpine:latest
  when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - chmod 600 $AWS_PEM_DEV
    - ssh-add $AWS_PEM_DEV
    - echo -e "Host *\\n\\tStrictHostKeyChecking no\\n\\n" > ~/.ssh/config
  script:
    - echo "🔙 Rolling back to BLUE environment..."
    
    - ssh ubuntu@$DEPLOY_SERVER_DEV "
        cd /home/ubuntu/dev/woori_be/deployment;
        ./deploy-bluegreen.sh switch blue;
      "
    
    - echo "Rollback to BLUE environment completed"
  environment:
    name: production-dev
    url: http://$DEPLOY_SERVER_DEV