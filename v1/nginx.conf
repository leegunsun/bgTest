events {
    worker_connections 1024;
}

http {
    # 로그 설정
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Upstream 정의
    upstream blue_backend {
        server 127.0.0.1:3001;
    }
    
    upstream green_backend {
        server 127.0.0.1:3002;
    }
    
    upstream active_backend {
        server 127.0.0.1:3001;  # 기본값: blue
    }
    
    # 메인 서버
    server {
        listen 80;
        server_name localhost;
        
        # 루트 경로 - 현재 활성 서버로
        location / {
            proxy_pass http://active_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Blue 서버 직접 접근
        location /blue {
            return 302 /blue/;
        }
        
        location /blue/ {
            proxy_pass http://blue_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Green 서버 직접 접근
        location /green {
            return 302 /green/;
        }
        
        location /green/ {
            proxy_pass http://green_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 전체 상태 확인 엔드포인트
        location /status {
            default_type application/json;
            return 200 "{\"nginx\": \"running\", \"config\": \"active\"}";
        }
    }
    
    # 관리자 인터페이스
    server {
        listen 8080;
        server_name localhost;
        
        location / {
            default_type text/html;
            return 200 "<!DOCTYPE html>
<html>
<head>
    <title>Blue-Green Control</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .blue-btn { 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
        }
        .green-btn { 
            background: linear-gradient(135deg, #27ae60, #229954); 
            color: white; 
        }
        .test-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .status {
            background: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .preview-box {
            border: 2px solid #dee2e6;
            border-radius: 5px;
            overflow: hidden;
        }
        .preview-title {
            padding: 10px;
            font-weight: bold;
            text-align: center;
        }
        .blue-title { background: #3498db; color: white; }
        .green-title { background: #27ae60; color: white; }
        iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
        .active-preview {
            grid-column: span 2;
        }
        .health-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            margin: 0 5px;
            font-size: 14px;
        }
        .healthy { background: #d4edda; color: #155724; }
        .unhealthy { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class=\"container\">
        <h1>🚀 Blue-Green Deployment Control Panel</h1>
        
        <div class=\"status\" id=\"status\">
            <strong>System Status:</strong> Ready for deployment operations
        </div>
        
        <div class=\"controls\">
            <button class=\"blue-btn\" onclick=\"switchToBlue()\">Switch to BLUE</button>
            <button class=\"green-btn\" onclick=\"switchToGreen()\">Switch to GREEN</button>
            <button class=\"test-btn\" onclick=\"runHealthCheck()\">Health Check</button>
        </div>
        
        <div class=\"preview\">
            <div class=\"preview-box active-preview\">
                <div class=\"preview-title\" style=\"background: #6c757d; color: white;\">
                    Current Active Deployment
                </div>
                <iframe id=\"active-frame\" src=\"/\"></iframe>
            </div>
            
            <div class=\"preview-box\">
                <div class=\"preview-title blue-title\">
                    Blue Server (Port 3001)
                    <span id=\"blue-health\" class=\"health-status\"></span>
                </div>
                <iframe src=\"/blue/\"></iframe>
            </div>
            
            <div class=\"preview-box\">
                <div class=\"preview-title green-title\">
                    Green Server (Port 3002)
                    <span id=\"green-health\" class=\"health-status\"></span>
                </div>
                <iframe src=\"/green/\"></iframe>
            </div>
        </div>
    </div>
    
    <script>
        function updateStatus(message, type) {
            const status = document.getElementById(\"status\");
            const colors = {
                success: \"#28a745\",
                error: \"#dc3545\",
                info: \"#17a2b8\"
            };
            status.style.borderLeftColor = colors[type] || colors.info;
            status.innerHTML = \"<strong>System Status:</strong> \" + message;
        }
        
        function switchToBlue() {
            updateStatus(\"Switching to BLUE deployment...\", \"info\");
            // 실제 구현 시 여기서 백엔드 API 호출
            setTimeout(() => {
                updateStatus(\"Successfully switched to BLUE deployment\", \"success\");
                document.getElementById(\"active-frame\").src = \"/blue/\";
            }, 1000);
        }
        
        function switchToGreen() {
            updateStatus(\"Switching to GREEN deployment...\", \"info\");
            // 실제 구현 시 여기서 백엔드 API 호출
            setTimeout(() => {
                updateStatus(\"Successfully switched to GREEN deployment\", \"success\");
                document.getElementById(\"active-frame\").src = \"/green/\";
            }, 1000);
        }
        
        async function runHealthCheck() {
            updateStatus(\"Running health checks...\", \"info\");
            
            try {
                const blueHealth = await fetch(\"/blue/health\").then(r => r.json());
                const greenHealth = await fetch(\"/green/health\").then(r => r.json());
                
                document.getElementById(\"blue-health\").className = \"health-status healthy\";
                document.getElementById(\"blue-health\").textContent = \"✓ Healthy\";
                
                document.getElementById(\"green-health\").className = \"health-status healthy\";
                document.getElementById(\"green-health\").textContent = \"✓ Healthy\";
                
                updateStatus(\"All servers are healthy\", \"success\");
            } catch(e) {
                updateStatus(\"Health check failed: \" + e.message, \"error\");
            }
        }
        
        // 초기 헬스체크 실행
        window.onload = () => {
            runHealthCheck();
        };
    </script>
</body>
</html>";
        }
    }
}
